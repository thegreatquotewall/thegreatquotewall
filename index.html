<!DOCTYPE html>
<html>
<head>
  <title>The Great Quote Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .submit-btn {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00d4ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    #quotes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .quote {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 20px;
      width: 300px;
      transition: 0.3s;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .quote:hover {
      transform: scale(1.05);
    }

    .quote h2 {
      font-size: 20px;
    }

    small {
      color: #00d4ff;
    }
  </style>
</head>

<body>

<h1>The Great Quote Wall</h1>

<a href="https://docs.google.com/forms/d/e/1FAIpQLScaFHGWChDKDjEWFNFUanL-EULR86040LQsjJoRNpirWLsvgg/viewform" target="_blank">
  <button class="submit-btn">Submit Your Quote</button>
</a>

<div id="quotes"></div>

<script>

fetch("https://opensheet.elk.sh/1IsFf9908tNuAtJ946L35LaJGHA9Fb0RSBJzUNkFzx_8/Form%20responses%201")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("quotes");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<p>No quotes yet.</p>";
    return;
  }

  data.forEach(item => {

    const quoteText = item["Enter your quote (max 25 words)"];
    const name = item["Your Name"];
    const category = item["Category"];

    if(!quoteText) return;

    const div = document.createElement("div");
    div.className = "quote";

    div.innerHTML = `
      <h2>"${quoteText}"</h2>
      <p>- ${name || "Anonymous"}</p>
      <small>${category || ""}</small>
    `;

    container.appendChild(div);

  });

})
.catch(err => {
  document.getElementById("quotes").innerHTML = "Error loading quotes";
  console.error(err);
});

</script>

</body>
</html>
