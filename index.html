<!DOCTYPE html>
<html>
<head>
  <title>The Great Quote Wall</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .quote {
      margin: 20px;
      padding: 20px;
      border: 1px solid #444;
      border-radius: 10px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<h1>🔥 The Great Quote Wall</h1>

<div id="quotes"></div>

<script>

fetch("https://opensheet.elk.sh/1IsFf9908tNuAtJ946L35LaJGHA9Fb0RSBJzUNkFzx_8/Form%20responses%201")
.then(response => response.json())
.then(data => {

  const container = document.getElementById("quotes");

  data.forEach(item => {

    // ✅ TEMP: show all quotes (fix issue)
    if(true) {

      const div = document.createElement("div");
      div.className = "quote";

      div.innerHTML = `
        <h2>"${item["Enter your quote (max 25 words)"] || "No quote"}"</h2>
        <p>- ${item["Your Name"] || "Anonymous"}</p>
        <small>${item["Category"] || ""}</small>
      `;

      container.appendChild(div);
    }

  });

})
.catch(error => console.error(error));

</script>

</body>
</html>
