<!DOCTYPE html>
<html>
<head>
  <title>The Great Quote Wall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #141e30, #243b55);
    }

    h1 {
      padding: 20px;
      font-size: 28px;
    }

    #quotes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .quote {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      max-width: 300px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .quote:hover {
      transform: scale(1.05);
    }

    .quote h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .quote p {
      margin: 5px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .category {
      font-size: 12px;
      color: #00d4ff;
    }
  </style>
</head>

<body>

  <h1>🔥 The Great Quote Wall</h1>

  <div id="quotes"></div>

  <script>
    fetch("https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1")
      .then(response => response.json())
      .then(data => {

        const container = document.getElementById("quotes");

        data.forEach(item => {

          // TEMP: show all quotes (remove filter issue)
          // Change later if needed
          if (true) {

            const div = document.createElement("div");
            div.className = "quote";

            div.innerHTML = `
              <h2>${item["Enter your quote (max 25 words)"] || "No Quote"}</h2>
              <p>- ${item["Your Name"] || "Anonymous"}</p>
              <p class="category">${item["Category"] || ""}</p>
            `;

            container.appendChild(div);
          }

        });

      })
      .catch(error => console.error("Error loading data:", error));
  </script>

</body>
</html>
